<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEU Library System</title>
<link rel="stylesheet" href="extra.css">
</head>

<body>

<div class="container">

  <div class="card">

    <div class="card-header">
      <div class="logo-circle">
        📚
      </div>

      <h1>NEU Library System</h1>
      <p class="subtitle">Visitor Management & Digital Logbook</p>
    </div>

    <div class="card-content">
      <form>

        <div class="form-group">
          <label>Institutional Email</label>
          <input
            type="email"
            placeholder="student.name@neu.edu.ph"
            required
          >
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            placeholder="Enter your password"
            required>
          <button onclick="login()">Sign in with Google</button>
        </div>

        <div class="demo">
          <p class="demo-title">Demo Accounts:</p>

          <p><strong>Admin:</strong> admin@neu.edu.ph</p>
          <p><strong>User:</strong> juan.delacruz@neu.edu.ph</p>

          <p class="note">(Any password works in demo mode)</p>
        </div>
      </form>
    </div>

  </div>

</div>

</body>
</html>
